# MCP Server Ingress Route
# Uses existing *.scoutos.live wildcard certificate
# 
# Apply: kubectl apply -f k8s/ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scout-mcp-ingress
  namespace: scout-live
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - mcp.scoutos.live
      secretName: scoutos.live-tls
  rules:
    - host: mcp.scoutos.live
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scout-mcp-server
                port:
                  number: 80